name = "prompt-magic-worker"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# 部署後改成你的頁面網域（可逗號分隔多個），鎖住來源防白嫖。
# 例： "https://prompt-magic.launchdock.app,https://589411.github.io"
ALLOWED_ORIGIN = "https://589411.github.io,https://prompt-magic.launchdock.app"

# 模型 id。⚠️ 看圖功能需要 vision 模型：
#   GitHub Models（免費額度，主路）→ openai/gpt-4o（支援看圖）
#   OpenRouter（備援）→ openai/gpt-4o-mini（支援看圖）
GH_MODEL = "openai/gpt-4o"
OPENROUTER_MODEL = "openai/gpt-4o-mini"
ANTHROPIC_MODEL = "claude-sonnet-4-6"

# 金鑰請用 secret，不要寫在這裡：
#   echo "$GITHUB_TOKEN" | wrangler secret put GITHUB_TOKEN
#   （備援）echo "$KEY" | wrangler secret put OPENROUTER_API_KEY
#   （備援）echo "$KEY" | wrangler secret put ANTHROPIC_API_KEY
